<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard Kimai - Heures par Activité</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #667eea;
        }

        .header .last-update {
            font-size: 0.9em;
            color: #666;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .summary-table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #667eea;
            font-weight: 600;
        }

        .summary-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .summary-table tr:last-child td {
            border-bottom: 2px solid #667eea;
            font-weight: bold;
            background: #f9f9f9;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .activity-name {
            flex: 1;
            font-weight: 500;
        }

        .activity-duration {
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-weight: bold;
            color: #666;
        }

        .percentage {
            color: #999;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .category-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-size: 0.95em;
            color: #666;
        }

        .total-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .total-card h2,
        .total-card .time {
            color: white;
        }

        .time {
            font-size: 2.5em;
            font-weight: bold;
            margin: 15px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .total-card {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard Kimai — Heures par Activité</h1>
            <div class="last-update">Mise à jour: <span id="last-update">--:--</span></div>
        </div>

        <div id="content">
            <div class="loading">⏳ Chargement des données...</div>
        </div>
    </div>

    <script>
        const CATEGORY_EMOJIS = {
            "Presence": "🟢",
            "Absences": "🔴",
            "Homelab": "🔵",
            "Coding": "🔶",
            "Obsidian": "🟡",
            "Velo": "🚴"
        };

        const CATEGORY_LABELS = {
            "Presence": "Présence",
            "Absences": "Absences",
            "Homelab": "Homelab",
            "Coding": "Coding Perso",
            "Obsidian": "Obsidian/Doc",
            "Velo": "Vélo"
        };

        const CATEGORY_ORDER = ["Presence", "Absences", "Homelab", "Coding", "Obsidian", "Velo"];

        async function loadDashboard() {
            try {
                // Essayer plusieurs chemins possibles
                const paths = [
                    './kimai_dashboard.json',
                    '../../../wiki/Informatique/Pointage_Stan/kimai_dashboard.json',
                    '/wiki/Informatique/Pointage_Stan/kimai_dashboard.json'
                ];

                let response = null;
                for (const path of paths) {
                    try {
                        response = await fetch(path);
                        if (response.ok) break;
                    } catch (e) {
                        continue;
                    }
                }

                if (!response || !response.ok) {
                    throw new Error('Fichier JSON non trouvé');
                }

                const data = await response.json();
                displayDashboard(data);
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>⚠️ Erreur:</strong> ${e.message}<br>
                        <br>
                        <strong>Solutions:</strong><br>
                        1. Exécute: <code>python kimai_sync_dashboard.py</code><br>
                        2. Copie <code>dashboard.html</code> à côté de <code>kimai_dashboard.json</code><br>
                        3. Ou accède via: <code>file:///D:/01_Documents/015_Obsidian/Brain_Stan/wiki/Informatique/Pointage_Stan/dashboard-kimai.md</code> (Obsidian)
                    </div>
                `;
            }
        }

        function displayDashboard(data) {
            const timestamp = new Date(data.timestamp).toLocaleTimeString('fr-FR');
            document.getElementById('last-update').textContent = timestamp;

            const total = data.total_seconds;
            let html = '<div class="grid">';

            // Résumé par catégorie
            const summaryCard = document.createElement('div');
            summaryCard.className = 'card';
            summaryCard.innerHTML = '<h2>📈 Résumé du jour</h2>';

            let tableHtml = '<table class="summary-table"><thead><tr><th>Catégorie</th><th>Heures</th><th>%</th></tr></thead><tbody>';

            for (const cat of CATEGORY_ORDER) {
                if (!(cat in data.by_category)) continue;

                const catData = data.by_category[cat];
                const pct = total > 0 ? Math.round((catData.total_seconds / total) * 100) : 0;
                const emoji = CATEGORY_EMOJIS[cat] || '•';
                const label = CATEGORY_LABELS[cat] || cat;

                tableHtml += `<tr><td>${emoji} ${label}</td><td><strong>${catData.total_formatted}</strong></td><td>${pct}%</td></tr>`;
            }

            tableHtml += `<tr><td><strong>TOTAL</strong></td><td><strong>${data.total_formatted}</strong></td><td>100%</td></tr></tbody></table>`;
            summaryCard.innerHTML += tableHtml;
            html += summaryCard.outerHTML;

            // Détails par catégorie
            for (const cat of CATEGORY_ORDER) {
                if (!(cat in data.by_category)) continue;

                const catData = data.by_category[cat];
                const emoji = CATEGORY_EMOJIS[cat] || '•';
                const label = CATEGORY_LABELS[cat] || cat;

                let catHtml = `<h2>${emoji} ${label}</h2>`;

                for (const act of catData.activities) {
                    const actColor = act.color || '#CCCCCC';
                    catHtml += `
                        <div class="activity-item">
                            <div class="activity-dot" style="background-color: ${actColor};"></div>
                            <div class="activity-name">${act.name}</div>
                            <div class="activity-duration">${act.duration}</div>
                        </div>
                    `;
                }

                catHtml += `<div class="category-total"><strong>Total:</strong> ${catData.total_formatted}</div>`;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = catHtml;
                html += card.outerHTML;
            }

            // Carte totale
            const totalCard = document.createElement('div');
            totalCard.className = 'card total-card';
            totalCard.innerHTML = `
                <h2>⏱️ Total du jour</h2>
                <div class="time">${data.total_formatted}</div>
                <p>${Object.keys(data.activities).length} activité(s) enregistrée(s)</p>
                <button class="refresh-btn" onclick="location.reload()">🔄 Actualiser</button>
            `;
            html += totalCard.outerHTML;

            html += '</div>';
            document.getElementById('content').innerHTML = html;
        }

        // Charger au démarrage
        loadDashboard();

        // Actualiser toutes les 60 secondes
        setInterval(loadDashboard, 60000);
    </script>
</body>
</html>
